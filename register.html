<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile - EscapeX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <style>
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; padding: 2rem 0;}
        .auth-card { width: 100%; max-width: 440px; padding: 3rem; background: var(--card-bg) !important; border: 1px solid var(--border-color) !important; backdrop-filter: blur(10px); transition: all 0.3s ease; }
    </style>
</head>
<body data-theme="light">
    


    <!-- Corner Controls -->
    <div class="corner-controls">
        <button class="rtl-toggle btn btn-sm btn-link"><i class="bi bi-translate"></i></button>
        <button class="theme-toggle btn btn-sm btn-link"><i class="bi bi-moon-stars-fill"></i></button>
    </div>

    <div class="auth-wrapper px-3">
        <div class="puzzle-card auth-card border-secondary">
            
            <div class="text-center mb-5">
                <a class="navbar-brand d-flex align-items-center justify-content-center gap-2 mb-2" href="index.html">
                    <i class="bi bi-box-fill text-secondary"></i> <span class="font-heading fs-3" style="color: var(--text-color)">EscapeX</span>
                </a>
                <p class="text-muted small tracking-widest text-uppercase">Register Operative ID</p>
            </div>

            <!-- Social -->
            <div class="d-flex gap-3 mb-4">
                <button class="btn btn-outline-secondary w-50 d-flex align-items-center justify-content-center">
                    <i class="bi bi-google text-danger me-2"></i> Google
                </button>
                <button class="btn btn-outline-secondary w-50 d-flex align-items-center justify-content-center">
                    <i class="bi bi-apple me-2"></i> Apple
                </button>
            </div>

            <div class="d-flex align-items-center mb-4 text-muted small">
                <hr class="flex-grow-1" style="border-color: var(--border-color) !important; opacity: 1;">
                <span class="px-3 tracking-widest">OR MANUAL</span>
                <hr class="flex-grow-1" style="border-color: var(--border-color) !important; opacity: 1;">
            </div>

            <form action="dashboard.html" class="needs-validation" novalidate>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small text-muted tracking-widest text-uppercase">First Node</label>
                        <input type="text" class="form-control py-2" placeholder="First Name" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-muted tracking-widest text-uppercase">Last Node</label>
                        <input type="text" class="form-control py-2" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-muted tracking-widest text-uppercase">Frequency (Email)</label>
                    <input type="email" class="form-control py-2" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small text-muted tracking-widest text-uppercase">Secure Code</label>
                    <div class="input-group">
                        <input type="password" class="form-control py-2" id="pwdInputR" required minlength="8">
                        <button class="btn btn-outline-secondary" type="button" id="togglePwdR"><i class="bi bi-eye"></i></button>
                    </div>
                </div>

                <div class="form-check mb-5">
                    <input class="form-check-input bg-transparent border-secondary" type="checkbox" id="terms" required>
                    <label class="form-check-label text-muted small" for="terms">
                        Acknowledge <a href="#" class="text-secondary">Waiver</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-secondary w-100 tracking-widest py-3">Generate ID</button>
            </form>

            <div class="text-center mt-5 pt-4 border-top" style="border-color: var(--border-color) !important;">
                <p class="text-muted small mb-0">Record encoded? <a href="login.html" class="text-secondary fw-bold text-decoration-none">Establish Link</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('togglePwdR')?.addEventListener('click', function() {
            const pwdInput = document.getElementById('pwdInputR');
            const icon = this.querySelector('i');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    </script>
</body>
</html>
