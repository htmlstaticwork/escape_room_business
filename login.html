<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access - EscapeX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2;}
        .auth-card { width: 100%; max-width: 440px; padding: 3rem; background: var(--card-bg) !important; border: 1px solid var(--border-color) !important; backdrop-filter: blur(10px); transition: all 0.3s ease; }
    </style>
</head>
<body data-theme="dark">
    
    <!-- Corner Controls -->
    <div class="corner-controls">
        <button class="rtl-toggle btn btn-sm btn-link"><i class="bi bi-translate"></i></button>
        <button class="theme-toggle btn btn-sm btn-link"><i class="bi bi-moon-stars-fill"></i></button>
    </div>



    <div class="auth-wrapper px-3">
        <div class="puzzle-card auth-card">
            
            <div class="text-center mb-5">
                <a class="navbar-brand d-flex align-items-center justify-content-center gap-2 mb-2" href="index.html">
                    <i class="bi bi-box-fill text-primary"></i> <span class="font-heading fs-3" style="color: var(--text-color)">EscapeX</span>
                </a>
                <p class="text-muted small tracking-widest text-uppercase">Player Portal Authentication</p>
            </div>

            <!-- Social -->
            <div class="d-flex flex-column gap-3 mb-4">
                <button class="btn btn-outline-theme w-100 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-google text-danger"></i> Link via Google
                </button>
                <button class="btn btn-outline-theme w-100 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-apple"></i> Link via Apple
                </button>
            </div>

            <div class="d-flex align-items-center mb-4 text-muted small">
                <hr class="flex-grow-1" style="border-color: var(--border-color) !important; opacity: 1;">
                <span class="px-3 tracking-widest">OR SCAN</span>
                <hr class="flex-grow-1" style="border-color: var(--border-color) !important; opacity: 1;">
            </div>

            <form action="dashboard.html" class="needs-validation" novalidate>
                <div class="mb-4">
                    <label class="form-label small text-muted tracking-widest text-uppercase">Designation (Email)</label>
                    <input type="email" class="form-control py-2" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small text-muted tracking-widest text-uppercase">Passcode</label>
                    <div class="input-group">
                        <input type="password" class="form-control py-2" id="pwdInput" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePwd"><i class="bi bi-eye"></i></button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div class="form-check">
                        <input class="form-check-input bg-transparent border-secondary" type="checkbox" id="persist">
                        <label class="form-check-label text-muted small" for="persist">Persist Log</label>
                    </div>
                    <a href="#" class="text-primary small text-decoration-none">Bypass Lock?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 tracking-widest py-3">Initiate Link</button>
            </form>

            <div class="text-center mt-5 pt-4 border-top" style="border-color: var(--border-color) !important;">
                <p class="text-muted small mb-0">No active profile? <a href="register.html" class="text-primary fw-bold text-decoration-none">Register ID</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('togglePwd')?.addEventListener('click', function() {
            const pwdInput = document.getElementById('pwdInput');
            const icon = this.querySelector('i');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    </script>
</body>
</html>
